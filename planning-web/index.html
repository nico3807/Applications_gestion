  <!-- ==================== MODALE DÉTAIL ÉVÉNEMENT ==================== -->
  <dialog id="evtDetailModal" aria-modal="true">
    <div class="modal-inner">

      <!-- Vue principale : détails -->
      <div id="detailView">
        <span id="detailGroup" class="detail-badge"></span>
        <p id="detailTitle" class="detail-title"></p>
        <p id="detailDate"  class="detail-date"></p>
        <div class="modal-actions">
          <button type="button" class="btn-danger"     id="detailDeleteBtn">− Supprimer</button>
          <button type="button" class="btn-secondary"  id="detailDuplicateBtn">⧉ Dupliquer</button>
          <button type="button" class="btn-secondary"  id="detailEditBtn">✎ Modifier</button>
          <button type="button" class="btn-secondary"  id="detailCloseBtn">Fermer</button>
        </div>
      </div>

      <!-- Vue confirmation suppression -->
      <div id="confirmView" hidden>
        <p class="confirm-msg">Supprimer cet événement du calendrier ?</p>
        <div class="modal-actions">
          <button type="button" class="btn-secondary"    id="confirmCancelBtn">Annuler</button>
          <button type="button" class="btn-danger-solid" id="confirmOkBtn">Supprimer</button>
        </div>
      </div>

      <!-- Vue édition -->
      <div id="editView" hidden>
        <h3 class="modal-title">Modifier l'événement</h3>
        <form id="editForm" novalidate>

          <div class="form-row">
            <label class="form-label" for="editGroup">Groupe</label>
            <select class="form-ctrl" id="editGroup" required>
              <option value="">— Choisir un groupe —</option>
              <option value="MMI1">MMI1</option>
              <option value="MMI2-crea">MMI2-crea</option>
              <option value="MMI2-Dev">MMI2-Dev</option>
              <option value="MMI2-App">MMI2-App</option>
              <option value="MMI3-crea">MMI3-crea</option>
              <option value="MMI3-Dev">MMI3-Dev</option>
              <option value="MMI3-App">MMI3-App</option>
              <option value="Salons">Salons</option>
              <option value="JPO">JPO</option>
              <option value="Autre">Autre</option>
              <option value="Réunion">Réunion</option>
              <option value="Férié">Férié</option>
            </select>
          </div>

          <div class="form-row form-row--dates">
            <div>
              <label class="form-label" for="editStart">Date de début</label>
              <input class="form-ctrl" type="date" id="editStart" required>
            </div>
            <div>
              <label class="form-label" for="editEnd">Date de fin</label>
              <input class="form-ctrl" type="date" id="editEnd" required>
            </div>
          </div>

          <div class="form-row">
            <label class="form-label" for="editTitle">Intitulé</label>
            <input class="form-ctrl" type="text" id="editTitle" required
                   placeholder="Nom de l'événement" maxlength="120">
          </div>

          <p id="editError" class="form-error" role="alert" aria-live="polite"></p>

          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="editCancelBtn">Annuler</button>
            <button type="button" class="btn-primary"   id="editOkBtn">OK</button>
          </div>

        </form>
      </div><!-- fin editView -->

      <!-- Vue duplication -->
      <div id="duplicateView" hidden>
        <h3 class="modal-title">Dupliquer l'événement</h3>

        <!-- Rappel de l'événement source (lecture seule) -->
        <div class="dup-source">
          <span id="dupGroup" class="detail-badge"></span>
          <p id="dupTitle" class="dup-source-title"></p>
        </div>

        <form id="dupForm" novalidate>
          <p class="form-label" style="margin-bottom:.5rem">Nouvelle période :</p>
          <div class="form-row form-row--dates">
            <div>
              <label class="form-label" for="dupStart">Date de début</label>
              <input class="form-ctrl" type="date" id="dupStart" required>
            </div>
            <div>
              <label class="form-label" for="dupEnd">Date de fin</label>
              <input class="form-ctrl" type="date" id="dupEnd" required>
            </div>
          </div>

          <p id="dupError" class="form-error" role="alert" aria-live="polite"></p>

          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="dupCancelBtn">Annuler</button>
            <button type="button" class="btn-primary"   id="dupOkBtn">Dupliquer</button>
          </div>
        </form>
      </div>

    </div>
  </dialog>

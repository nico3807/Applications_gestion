<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion REH — MMI</title>
    <link rel="stylesheet" href="../repartition/static/style.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a href="../index.html" title="Retour à l'accueil MMI"
           style="display:flex;align-items:center;flex-shrink:0;line-height:0;">
          <img src="../logo_mmi.jpg" alt="MMI"
               style="height:32px;width:auto;border-radius:4px;display:block;opacity:0.9;">
        </a>
        <span class="site-title">Gestion REH</span>
        <nav id="main-nav">
          <a href="#" class="nav-link" id="nav-portfolio"
             onclick="navigate('portfolio'); return false;">Portfolio</a>
          <a href="#" class="nav-link" id="nav-sae"
             onclick="navigate('sae'); return false;">SAÉ</a>
          <a href="#" class="nav-link" id="nav-missions"
             onclick="navigate('missions'); return false;">Missions</a>
          <a href="#" class="nav-link" id="nav-autre"
             onclick="navigate('autre'); return false;">Autre</a>
          <a href="#" class="nav-link" id="nav-parcoursup"
             onclick="navigate('parcoursup'); return false;">Parcoursup</a>
          <a href="#" class="nav-link" id="nav-recapitulatif"
             onclick="navigate('recapitulatif'); return false;">Récapitulatif</a>
        </nav>
        <button id="menu-toggle" aria-label="Ouvrir le menu" aria-expanded="false">&#9776;</button>
      </div>
    </header>

    <main id="app-root"></main>

    <footer>
      <p>Gestion REH — BUT MMI Béziers</p>
    </footer>

    <div id="toast" class="toast"></div>

    <script src="../auth.js"></script>
    <script src="script.js"></script>
    <script>
      (function () {
        var btn = document.getElementById('menu-toggle');
        var nav = document.getElementById('main-nav');
        if (!btn || !nav) return;
        btn.addEventListener('click', function () {
          var open = nav.classList.toggle('open');
          btn.setAttribute('aria-expanded', String(open));
          btn.textContent = open ? '✕' : '☰';
        });
        nav.addEventListener('click', function (e) {
          if (e.target.closest('.nav-link')) {
            nav.classList.remove('open');
            btn.setAttribute('aria-expanded', 'false');
            btn.textContent = '☰';
          }
        });
      })();
    </script>
  </body>
</html>

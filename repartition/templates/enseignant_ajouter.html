{% extends "base.html" %} {% block title %}Ajouter un enseignant — MMI
Répartition 2026-27{% endblock %} {% block content %}
<div class="page-header">
  <h1>Ajouter un enseignant</h1>
  <p class="subtitle">L'enseignant sera disponible dans tous les semestres</p>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('enseignant_ajouter') }}">
    <div class="form-group">
      <label for="nom">Nom <span class="required">*</span></label>
      <input
        type="text"
        id="nom"
        name="nom"
        class="form-input"
        placeholder="NOM (en majuscules)"
        required
      />
    </div>
    <div class="form-group">
      <label for="prenom">Prénom</label>
      <input
        type="text"
        id="prenom"
        name="prenom"
        class="form-input"
        placeholder="Prénom"
      />
    </div>
    <div class="form-group">
      <label for="service_du">Service dû (heures)</label>
      <input
        type="number"
        id="service_du"
        name="service_du"
        class="form-input"
        min="0"
        step="1"
        placeholder="ex : 384"
      />
    </div>
    <div class="form-group form-group-check">
      <label> <input type="checkbox" name="is_vac" /> Vacataire </label>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('services') }}" class="btn-cancel">Annuler</a>
      <button type="submit" class="btn-save">Enregistrer</button>
    </div>
  </form>
</div>
{% endblock %}

{% extends "base.html" %} {% block title %}Modifier un enseignant — MMI
Répartition 2026-27{% endblock %} {% block content %}
<div class="page-header">
  <h1>Modifier le service dû</h1>
  <p class="subtitle">Mise à jour du service dû d'un enseignant</p>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('enseignant_modifier') }}">
    <div class="form-group">
      <label for="enseignant_id"
        >Enseignant <span class="required">*</span></label
      >
      <select
        id="enseignant_id"
        name="enseignant_id"
        class="select-enseignant form-input"
        required
        onchange="updateServiceDu(this)"
      >
        <option value="">— sélectionner —</option>
        {% for ens in enseignants %}
        <option
          value="{{ ens.id }}"
          data-service-du="{{ ens.service_du if ens.service_du else '' }}"
          {%
          if
          ens.id=""
          ="selected"
          %}selected{%
          endif
          %}
        >
          {{ ens.id }}{% if ens.is_vac %} (vac.){% endif %}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="service_du"
        >Service dû (heures) <span class="required">*</span></label
      >
      <input
        type="number"
        id="service_du"
        name="service_du"
        class="form-input"
        min="0"
        step="1"
        placeholder="ex : 384"
        value="{{ enseignants | selectattr('id','equalto', selected) | map(attribute='service_du') | first | default('', true) }}"
      />
    </div>
    <div class="form-actions">
      <a href="{{ url_for('services') }}" class="btn-cancel">Annuler</a>
      <button type="submit" class="btn-save">Enregistrer</button>
    </div>
  </form>
</div>

<script>
  function updateServiceDu(sel) {
    const opt = sel.options[sel.selectedIndex];
    document.getElementById("service_du").value = opt.dataset.serviceDu || "";
  }
  // Init si présélectionné
  document.addEventListener("DOMContentLoaded", function () {
    const sel = document.getElementById("enseignant_id");
    if (sel.value) updateServiceDu(sel);
  });
</script>
{% endblock %}

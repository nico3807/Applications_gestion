{% extends "base.html" %} {% block title %}Maquette — MMI Répartition 2026-27{%
endblock %} {% block content %}
<div class="page-header">
  <h1>Maquette pédagogique</h1>
  <p class="subtitle">
    Visualisation et ajustement des volumes horaires par semestre
  </p>
</div>

<div class="semestre-grid maquette-badge-grid">
  {% for s in semestres %}
  <a href="{{ url_for('maquette_semestre', semestre_slug=slug_fn(s)) }}"
     class="badge-semestre" data-sem="{{ s[:2] }}">{{ s }}</a>
  {% endfor %}
</div>
{% endblock %}

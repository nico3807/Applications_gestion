<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Répartition MMI 2026-2027</title>
    <link rel="stylesheet" href="static/style.css" />
    <style>
      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #16a34a;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 2000;
        font-weight: 600;
      }
      .toast.show {
        opacity: 1;
      }

      /* Styles pour les semestres et parcours Créa & Dev */
      [data-sem="S1"] {
        --parcours-color: #3b82f6;
        --parcours-bg: #dbeafe;
        --parcours-border: #93c5fd;
        --parcours-text: #1e40af;
      }
      [data-sem="S2"] {
        --parcours-color: #22c55e;
        --parcours-bg: #dcfce7;
        --parcours-border: #86efac;
        --parcours-text: #166534;
      }
      [data-sem="S3"] {
        --parcours-color: #eab308;
        --parcours-bg: #fef9c3;
        --parcours-border: #fde047;
        --parcours-text: #854d0e;
      }
      [data-sem*="crea"] {
        --parcours-color: #7c3aed;
        --parcours-bg: #ede9fe;
        --parcours-border: #c4b5fd;
        --parcours-text: #5b21b6;
      }
      [data-sem*="dev"] {
        --parcours-color: #0369a1;
        --parcours-bg: #e0f2fe;
        --parcours-border: #7dd3fc;
        --parcours-text: #075985;
      }

      .semestre-card[data-sem="S1"],
      .semestre-card[data-sem="S2"],
      .semestre-card[data-sem="S3"],
      .semestre-card[data-sem*="crea"],
      .semestre-card[data-sem*="dev"] {
        background-color: var(--parcours-bg);
        color: var(--parcours-text);
        font-weight: 600;
        border-left: 5px solid var(--parcours-color);
      }

      .sem-btn[data-sem*="crea"],
      .sem-btn[data-sem*="dev"] {
        background-color: var(--parcours-bg);
        color: var(--parcours-text);
        border: 1px solid var(--parcours-border);
      }
      .sem-btn[data-sem*="crea"].active,
      .sem-btn[data-sem*="crea"]:hover,
      .sem-btn[data-sem*="dev"].active,
      .sem-btn[data-sem*="dev"]:hover {
        background-color: var(--parcours-color);
        color: white;
        border-color: var(--parcours-color);
      }

      .badge-semestre[data-sem*="crea"],
      .badge-semestre[data-sem*="dev"] {
        background-color: var(--parcours-bg);
        color: var(--parcours-text);
        border: 1px solid var(--parcours-border);
        font-weight: 600;
      }
    </style>
    <style>
      /* ── Bouton Archive ──────────────────────────────────── */
      .nav-link-archive {
        margin-left: 2rem;
        background: rgba(217,119,6,.18);
        color: #fde68a !important;
        border: 1px solid rgba(217,119,6,.4);
        border-radius: 6px;
        font-size: 0.78rem;
      }
      .nav-link-archive:hover { background: rgba(217,119,6,.32) !important; }
      .nav-link-current {
        margin-left: 0.75rem;
        background: rgba(34,197,94,.18);
        color: #bbf7d0 !important;
        border: 1px solid rgba(34,197,94,.4);
        border-radius: 6px;
        font-size: 0.78rem;
      }
      .nav-link-current:hover { background: rgba(34,197,94,.32) !important; }

      /* ── Bandeau archive ─────────────────────────────────── */
      #archive-banner {
        background: linear-gradient(90deg, #92400e, #b45309);
        color: #fef3c7;
        text-align: center;
        padding: 6px 1rem;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: .03em;
        position: sticky;
        top: 54px;
        z-index: 90;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a href="../index.html" title="Retour à l'accueil MMI" style="display:flex;align-items:center;flex-shrink:0;line-height:0;"><img src="../logo_mmi.jpg" alt="MMI" style="height:32px;width:auto;border-radius:4px;display:block;opacity:0.9;"></a>
        <a href="#" class="site-title" onclick="navigate('home')"
          >Répartition - <span id="app-year">26-27</span></
        >
        <nav id="main-nav">
          <a href="#" class="nav-link nav-link-services" id="nav-home" onclick="navigate('home')"
            >Répartition</a
          >
          <a
            href="#"
            class="nav-link nav-link-services"
            id="nav-maquette"
            onclick="navigate('maquette_index')"
            >Maquette</a
          >
          <a
            href="#"
            class="nav-link nav-link-services"
            id="nav-services"
            onclick="navigate('services')"
            >Services</a
          >
          <a
            href="#"
            class="nav-link nav-link-services"
            id="nav-enseignants"
            onclick="navigate('enseignants')"
            >Enseignants</a
          >
          <a
            href="#"
            class="nav-link nav-link-services"
            id="nav-souhaits"
            onclick="navigate('souhaits')"
            >Souhaits</a
          >
          <a
            href="#"
            class="nav-link nav-link-admin"
            id="nav-modifications"
            onclick="navigate('modifications')"
            style="display:none"
            >Journal</a
          >
          <a
            href="#"
            class="nav-link nav-link-admin"
            id="nav-pilotage"
            onclick="navigate('pilotage')"
            style="display:none"
            >Pilotage</a
          >
          <a
            href="#"
            class="nav-link nav-link-admin"
            id="nav-sae"
            onclick="navigate('sae')"
            style="display:none"
            >SAÉ</a
          >
          <a
            href="#"
            class="nav-link nav-link-archive"
            id="nav-archive"
            onclick="switchToArchive()"
            style="text-align:center;line-height:1.25;"
            >Archive<br><span style="font-size:10px;opacity:.85;">25-26</span></a
          >
          <a
            href="#"
            class="nav-link nav-link-current"
            id="nav-current"
            onclick="switchToCurrent()"
            style="display:none"
            >↩ 2026-2027</a
          >
        </nav>
      </div>
    </header>

    <!-- Conteneur principal géré par app.js -->
    <main id="app-root"></main>

    <footer>
      <p>MMI Répartition — BUT MMI Béziers 2026-27 (Version Statique GitHub)</p>
    </footer>

    <!-- Conteneur des notifications -->
    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="../auth.js"></script>
    <script>
      if (!AUTH.isAuth()) { location.href = "../index.html"; }
      if (!AUTH.canAccess('repartition') && location.hash !== "#souhaits") { location.href = "../index.html"; }
    </script>
    <script src="app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Déplacement de cours — MMI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="nav">
      <a href="../index.html" class="nav-back">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Accueil
      </a>
      <span class="nav-title">Déplacement de cours — MMI</span>
      <a href="statut.html" id="statut-link" class="nav-back"
         style="display:none; margin-left:auto; font-size:.8rem; white-space:nowrap;">
        État des demandes
      </a>
      <a href="suivi.html" id="suivi-link" class="nav-back"
         style="display:none; font-size:.8rem; white-space:nowrap;">
        Suivi des demandes
      </a>
      <div class="header-inner"></div>
    </nav>

    <div id="access-denied" style="display:none; text-align:center; padding:4rem 1rem;">
      <p style="font-size:1.1rem; font-weight:700; color:#dc2626;">Accès non autorisé</p>
      <p style="color:#6b7280;">Vous n'avez pas l'autorisation d'accéder à cette application.</p>
    </div>

    <div class="form-page" id="app-content" style="display:none">
      <div class="form-card">
        <h1 class="form-title">Modification d'emploi du temps</h1>
        <p class="form-sub">IUT de Béziers · Département MMI</p>

        <form id="edtForm">
          <div class="fg">
            <label class="flbl" for="nom">Nom de l'enseignant *</label>
            <select id="nom" name="nom" class="finput" required>
              <option value="">Chargement…</option>
            </select>
          </div>

          <div class="fg">
            <label class="flbl" for="parcours">Parcours concerné *</label>
            <select id="parcours" name="parcours" class="finput" required>
              <option value="">Sélectionnez un parcours…</option>
              <option value="MMI1">MMI1</option>
              <option value="MMI2 Créa">MMI2 Créa</option>
              <option value="MMI2 Dev">MMI2 Dev</option>
              <option value="MMI3 Créa">MMI3 Créa</option>
              <option value="MMI3 Dev">MMI3 Dev</option>
            </select>
          </div>

          <div class="fg">
            <label class="flbl" for="ressource">Ressource ou SAÉ *</label>
            <select id="ressource" name="ressource" class="finput" required>
              <option value="">Sélectionnez d'abord un parcours…</option>
            </select>
          </div>

          <div style="border:1.5px solid #f59e0b; background:#fffbeb; border-radius:8px; padding:1rem; margin-bottom:1.25rem;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
              <div class="fg" style="margin-bottom:0;">
                <label class="flbl" for="date_cours"
                  >Date du cours à modifier *</label
                >
                <input
                  type="date"
                  id="date_cours"
                  name="date_cours"
                  class="finput"
                  required
                  style="width: auto"
                />
              </div>
              <div class="fg" style="margin-bottom:0;">
                <label class="flbl" for="heure_cours"
                  >Plage horaire du cours *</label
                >
                <select
                  id="heure_cours"
                  name="heure_cours"
                  class="finput"
                  required
                >
                  <option value="">Sélectionnez un créneau…</option>
                  <option value="08h-9h30">08h - 9h30</option>
                  <option value="09h30-11h">9h30 - 11h</option>
                  <option value="11h-12h30">11h - 12h30</option>
                  <option value="14h-15h30">14h - 15h30</option>
                  <option value="15h30-17h">15h30 - 17h</option>
                  <option value="17h-18h30">17h - 18h30</option>
                  <option value="08h-11h">08h - 11h</option>
                  <option value="9h30-12h30">9h30 - 12h30</option>
                  <option value="14h-17h">14h - 17h</option>
                  <option value="15h30-18h30">15h30 - 18h30</option>
                </select>
              </div>
            </div>
          </div>

          <div style="border:1.5px solid #6ee7b7; background:#f0fdf4; border-radius:8px; padding:1rem; margin-bottom:1.25rem;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
              <div class="fg" style="margin-bottom:0;">
                <label class="flbl" for="date_cours_souhaite"
                  >Nouvelle date souhaitée *</label
                >
                <input
                  type="date"
                  id="date_cours_souhaite"
                  name="date_cours_souhaite"
                  class="finput"
                  required
                  style="width: auto"
                />
              </div>
              <div class="fg" style="margin-bottom:0;">
                <label class="flbl" for="heure_cours_souhaitee"
                  >Nouveau créneau horaire souhaité *</label
                >
                <select
                  id="heure_cours_souhaitee"
                  name="heure_cours_souhaitee"
                  class="finput"
                  required
                >
                  <option value="">Sélectionnez un créneau…</option>
                  <option value="08h-9h30">08h – 9h30</option>
                  <option value="09h30-11h">9h30 – 11h</option>
                  <option value="11h-12h30">11h – 12h30</option>
                  <option value="14h-15h30">14h – 15h30</option>
                  <option value="15h30-17h">15h30 – 17h</option>
                  <option value="17h-18h30">17h – 18h30</option>
                  <option value="08h-11h">08h – 11h</option>
                  <option value="9h30-12h30">9h30 – 12h30</option>
                  <option value="14h-17h">14h – 17h</option>
                  <option value="15h30-18h30">15h30 – 18h30</option>
                </select>
              </div>
            </div>
          </div>

          <div class="fg">
            <label class="flbl" for="motif">Motif de la demande *</label>
            <textarea
              id="motif"
              name="motif"
              class="finput"
              rows="4"
              required
            ></textarea>
          </div>

          <div class="fg fg--urgence">
            <input type="checkbox" id="urgence" name="urgence" />
            <label for="urgence"
              ><strong>Urgence absolue / Force majeure</strong> (délai du jeudi
              dépassé)</label
            >
          </div>

          <div class="fg hidden" id="justification_urgence_container">
            <label class="flbl" for="justification_urgence"
              >Justification de l'urgence *</label
            >
            <textarea
              id="justification_urgence"
              name="justification_urgence"
              class="finput"
              rows="3"
            ></textarea>
          </div>

          <button type="submit" id="submitBtn" class="fsubmit">
            Soumettre la demande
          </button>
          <div id="formMessage"></div>
        </form>
      </div>
    </div>

    <script src="../auth.js"></script>
    <script>
      const _VALIDATORS = ["nicolas.maurin", "sylvie.escaig", "william.bernard"];
      function _setup() {
        AUTH.injectBadge();
        if (!AUTH.canView("deplacement_cours")) {
          document.getElementById("access-denied").style.display = "";
          return;
        }
        document.getElementById("app-content").style.display = "";
        if (AUTH.isAuth()) document.getElementById("statut-link").style.display = "";
        if (_VALIDATORS.includes(AUTH.user())) document.getElementById("suivi-link").style.display = "";
      }
      window.addEventListener("auth-success", _setup, { once: true });
      AUTH.injectUI();
    </script>
    <script src="script.js"></script>
  </body>
</html>
